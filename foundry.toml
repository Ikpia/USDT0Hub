[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 64

[rpc_endpoints]
conflux_testnet = "${CONFLUX_ESPACE_TESTNET_RPC}"
conflux_mainnet = "${CONFLUX_ESPACE_RPC}"
